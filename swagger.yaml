openapi: 3.0.0
info:
  title: 'API Livros'
  description: 'Documentação da API Livros'
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8080/api-livros'
    description: 'Servidor local'
paths:
  /register:
    post:
      tags:
        - Auth
      summary: 'Realiza o cadastro de um novo usuário'
      operationId: 6ca1953c104d60936b62117784734f90
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 'Usuário registrado com sucesso'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: 'Dados inválidos ou email já cadastrado'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 'Erro interno ao cadastrar usuário'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /login:
    post:
      tags:
        - Auth
      summary: 'Realiza login do usuário'
      operationId: f6b87925c502a2f52803eb2945e0b2f6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 'Login realizado com sucesso'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: 'Erro de validação na requisição'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 'Credenciais inválidas'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /livros:
    get:
      tags:
        - Livros
      summary: 'Lista livros do usuário autenticado'
      operationId: c96a15ceb383a6a24fcdf8b8c54bef72
      parameters:
        -
          name: page
          in: query
          description: 'Página atual'
          required: false
          schema:
            type: integer
            example: 1
            default: 1
        -
          name: limit
          in: query
          description: 'Quantidade de itens por página'
          required: false
          schema:
            type: integer
            example: 10
            default: 10
      responses:
        '200':
          description: 'Livros retornados com sucesso'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LivroListResponse'
        '401':
          description: 'Não autenticado'
        '404':
          description: 'Nenhum livro encontrado'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
          userUuid: []
    post:
      tags:
        - Livros
      summary: 'Cria um novo livro para o usuário autenticado'
      operationId: b739368170d28460413bda43250d382b
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LivroCreateRequest'
      responses:
        '201':
          description: 'Livro criado com sucesso'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LivroCreateResponse'
        '400':
          description: 'Dados inválidos'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 'Não autenticado'
        '500':
          description: 'Erro ao criar livro'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
          userUuid: []
  /livro/editar:
    put:
      tags:
        - Livros
      summary: 'Atualiza um livro existente do usuário autenticado'
      operationId: ef2a4c7b5838f9683848a5cb260d5072
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LivroUpdateRequest'
      responses:
        '200':
          description: 'Livro atualizado com sucesso'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LivroUpdateResponse'
        '400':
          description: 'Id do livro ausente ou dados inválidos'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 'Não autenticado'
        '404':
          description: 'Livro não encontrado'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 'Erro ao atualizar livro'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
          userUuid: []
  /livro/deletar:
    delete:
      tags:
        - Livros
      summary: 'Deleta um livro do usuário autenticado'
      operationId: 667fd149a974d2e4cc69b61f1e1ccee0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LivroDeleteRequest'
      responses:
        '204':
          description: 'Livro deletado com sucesso'
        '400':
          description: 'Id do livro não informado'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 'Não autenticado'
        '404':
          description: 'Livro não encontrado'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
          userUuid: []
  /recuperar-senha:
    post:
      tags:
        - Senha
      summary: 'Solicita recuperação de senha'
      operationId: 6c4bbe3c4383d35ae0ddc5a28f6bc122
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: teste@email.com
              type: object
      responses:
        '200':
          description: 'Solicitação processada com sucesso'
          content:
            application/json:
              schema:
                properties:
                  success: { type: boolean, example: true }
                  mensagem: { type: string, example: 'Se o e-mail estiver cadastrado, você receberá instruções para redefinir sua senha.' }
                type: object
        '400':
          description: 'E-mail não informado'
          content:
            application/json:
              schema:
                properties:
                  success: { type: boolean, example: false }
                  mensagem: { type: string, example: 'E-mail é obrigatório' }
                type: object
        '500':
          description: 'Erro ao gerar token ou enviar e-mail'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Erro ao enviar e-mail' }
                type: object
  /redefinir-senha:
    post:
      tags:
        - Senha
      summary: 'Redefine a senha do usuário'
      operationId: f1050548a77cb0a6d6db0f7e4042d2cb
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - token
                - senha
              properties:
                token:
                  type: string
                  example: a1b2c3d4e5f6g7h8
                senha:
                  type: string
                  format: password
                  example: NovaSenha@123
              type: object
      responses:
        '200':
          description: 'Senha redefinida com sucesso'
          content:
            application/json:
              schema:
                properties:
                  success: { type: boolean, example: true }
                  mensagem: { type: string, example: 'Senha redefinida com sucesso' }
                type: object
        '401':
          description: 'Não autenticado'
        '500':
          description: 'Não foi possível atualizar a senha'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Nao foi possível atualizar a senha' }
                type: object
      security:
        -
          bearerAuth: []
  /usuario/foto:
    put:
      tags:
        - Usuário
      summary: 'Atualiza a foto de perfil do usuário autenticado'
      operationId: a76c0610241bf27126a5aaf1daaf901e
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioFotoRequest'
      responses:
        '200':
          description: 'Foto atualizada'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioFotoResponse'
        '400':
          description: 'URL inválida'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 'Não autenticado'
        '500':
          description: 'Erro interno'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
          userUuid: []
  /usuario/editar:
    put:
      tags:
        - Usuário
      summary: 'Edita os dados do usuário autenticado'
      operationId: 1d5a34df27b031edaa374d48a954007c
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioUpdateRequest'
      responses:
        '200':
          description: 'Usuário atualizado'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioUpdateResponse'
        '401':
          description: 'Não autenticado'
        '409':
          description: 'Email já em uso'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 'Erro interno'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
          userUuid: []
  /usuario/deletar:
    delete:
      tags:
        - Usuário
      summary: 'Deleta o usuário autenticado'
      operationId: 74bbaace1c33425420c5a153b5fc54df
      responses:
        '200':
          description: 'Usuário deletado'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioDeleteResponse'
        '401':
          description: 'Não autenticado'
        '500':
          description: 'Erro interno'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
          userUuid: []
  /usuario:
    get:
      tags:
        - Usuário
      summary: 'Lista os dados do usuário autenticado'
      operationId: 1ee74c0a21f0b1d380b76ab89163a811
      responses:
        '200':
          description: 'Usuário encontrado'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioListResponse'
        '401':
          description: 'Não autenticado'
        '404':
          description: 'Usuário não encontrado'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
          userUuid: []
components:
  schemas:
    RegisterRequest:
      required:
        - nome
        - email
        - senha
      properties:
        nome:
          type: string
          example: 'Luiz Felipe'
          maxLength: 255
        email:
          type: string
          format: email
          example: teste@email.com
        senha:
          type: string
          format: password
          example: 12345678Ab@
      type: object
    LoginRequest:
      required:
        - email
        - senha
      properties:
        email:
          type: string
          format: email
          example: teste@email.com
        senha:
          type: string
          format: password
          example: 12345678Ab@
      type: object
    LoginDetailResource:
      properties:
        mensagem:
          type: string
          example: 'Login realizado com sucesso'
        access_token:
          type: string
          example: jwt_aqui
        UUID:
          type: string
          example: e04230085f34fcdc518137ac826725
        nome:
          type: string
          example: 'Luiz Felipe'
        email:
          type: string
          format: email
          example: teste@email.com
        foto_perfil:
          type: string
          example: null
          nullable: true
      type: object
    RegisterResponse:
      properties:
        success:
          type: boolean
          example: true
        detail:
          properties:
            mensagem:
              type: string
              example: 'Usuário registrado com sucesso'
          type: object
      type: object
    LoginResponse:
      properties:
        success:
          type: boolean
          example: true
        detail:
          $ref: '#/components/schemas/LoginDetailResource'
      type: object
    ErrorResponse:
      properties:
        success:
          type: boolean
          example: false
        mensagem:
          type: string
          example: 'Erro ao processar requisição'
      type: object
    LivroResource:
      properties:
        id:
          type: integer
          example: 10
        titulo:
          type: string
          example: 'Dom Casmurro'
        autor:
          type: string
          example: 'Machado de Assis'
        ano:
          type: integer
          example: 1899
          nullable: true
        genero:
          type: string
          example: Romance
          nullable: true
        status:
          type: string
          example: quero_ler
        avaliacao:
          type: integer
          example: 5
          nullable: true
        anotacoes:
          type: string
          example: 'Clássico da literatura brasileira'
          nullable: true
      type: object
    LivroCreateRequest:
      required:
        - titulo
        - autor
        - ano
        - status
      properties:
        titulo:
          type: string
          example: 'Dom Casmurro'
        autor:
          type: string
          example: 'Machado de Assis'
        ano:
          type: integer
          example: 1899
        genero:
          type: string
          example: Romance
          nullable: true
        status:
          type: string
          example: quero_ler
        avaliacao:
          type: integer
          example: 5
          nullable: true
        anotacoes:
          type: string
          example: 'Clássico da literatura brasileira'
          nullable: true
      type: object
    LivroUpdateRequest:
      required:
        - id_livro
      properties:
        id_livro:
          type: integer
          example: 10
        titulo:
          type: string
          example: 'Dom Casmurro - edição revisada'
          nullable: true
        autor:
          type: string
          example: 'Machado de Assis'
          nullable: true
        ano:
          type: integer
          example: 1900
          nullable: true
        genero:
          type: string
          example: Romance
          nullable: true
        status:
          type: string
          example: lendo
          nullable: true
        avaliacao:
          type: integer
          example: 4
          nullable: true
        anotacoes:
          type: string
          example: 'Leitura em andamento'
          nullable: true
      type: object
    LivroDeleteRequest:
      required:
        - id_livro
      properties:
        id_livro:
          type: integer
          example: 10
      type: object
    LivroListRequest:
      required:
        - page
        - limit
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 5
      type: object
    LivroListResponse:
      properties:
        detail:
          properties:
            livros:
              type: array
              items:
                $ref: '#/components/schemas/LivroResource'
            paginacao:
              properties:
                page:
                  type: integer
                  example: 1
                limit:
                  type: integer
                  example: 10
                total:
                  type: integer
                  example: 25
                total_pages:
                  type: integer
                  example: 3
              type: object
          type: object
      type: object
    LivroCreateResponse:
      properties:
        mensagem:
          type: string
          example: 'Livro criado com sucesso'
        id:
          type: integer
          example: 10
      type: object
    LivroUpdateResponse:
      properties:
        mensagem:
          type: string
          example: 'Livro atualizado com sucesso'
        detail:
          properties:
            livro:
              $ref: '#/components/schemas/LivroResource'
          type: object
      type: object
    UsuarioFotoRequest:
      required:
        - url_foto
      properties:
        url_foto:
          type: string
          format: uri
          example: 'https://meusite.com/imagens/foto.jpg'
      type: object
    UsuarioUpdateRequest:
      properties:
        nome:
          type: string
          example: 'Luiz Felipe'
        email:
          type: string
          format: email
          example: luiz@email.com
      type: object
    UsuarioResource:
      properties:
        id_usuario:
          type: integer
          example: 1
        UUID:
          type: string
          example: e04230085f34fcdc518137ac826725
        nome:
          type: string
          example: 'Luiz Felipe'
        email:
          type: string
          format: email
          example: teste@email.com
        foto_perfil:
          type: string
          example: null
          nullable: true
      type: object
    UsuarioFotoResponse:
      properties:
        success:
          type: boolean
          example: true
        detail:
          properties:
            mensagem:
              type: string
              example: 'Foto de perfil atualizada com sucesso'
            foto_perfil:
              type: string
              format: uri
              example: 'https://meusite.com/imagens/foto.jpg'
          type: object
      type: object
    UsuarioUpdateResponse:
      properties:
        success:
          type: boolean
          example: true
        detail:
          properties:
            mensagem:
              type: string
              example: 'Usuario atualizado com sucesso'
            usuario:
              properties:
                id_usuario:
                  type: integer
                  example: 1
              type: object
          type: object
      type: object
    UsuarioDeleteResponse:
      properties:
        success:
          type: boolean
          example: true
        detail:
          properties:
            mensagem:
              type: string
              example: 'Usuário deletado com sucesso'
          type: object
      type: object
    UsuarioListResponse:
      properties:
        success:
          type: boolean
          example: true
        detail:
          properties:
            mensagem:
              type: string
              example: 'Usuário encontrado'
            usuario:
              $ref: '#/components/schemas/UsuarioResource'
          type: object
      type: object
  securitySchemes:
    bearerAuth:
      type: http
      bearerFormat: JWT
      scheme: bearer
    userUuid:
      type: apiKey
      description: 'UUID do usuário'
      name: X-USER-UUID
      in: header
tags:
  -
    name: Auth
    description: Auth
  -
    name: Livros
    description: Livros
  -
    name: Senha
    description: Senha
  -
    name: Usuário
    description: Usuário
