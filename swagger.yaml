openapi: 3.0.0
info:
  title: 'API Livros'
  description: 'Documentação da API Livros'
  version: 1.0.0
servers:
  -
    url: 'http://localhost/Api-Livros'
    description: 'Servidor local'
paths:
  /register:
    post:
      tags:
        - Auth
      summary: 'Realiza o cadastro de um novo usuário'
      operationId: 6ca1953c104d60936b62117784734f90
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - nome
                - email
                - senha
              properties:
                nome:
                  type: string
                  example: 'Luiz Felipe'
                  maxLength: 255
                email:
                  type: string
                  format: email
                  example: teste@email.com
                senha:
                  type: string
                  format: password
                  example: 12345678Ab@
              type: object
      responses:
        '201':
          description: 'Usuário registrado com sucesso'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Usuário registrado com sucesso' }
                type: object
        '400':
          description: 'Dados inválidos ou email já cadastrado'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Email já cadastrado' }
                type: object
        '500':
          description: 'Erro interno ao cadastrar usuário'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Erro ao cadastrar usuário' }
                type: object
  /login:
    post:
      tags:
        - Auth
      summary: 'Realiza login do usuário'
      operationId: f6b87925c502a2f52803eb2945e0b2f6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - email
                - senha
              properties:
                email:
                  type: string
                  format: email
                  example: teste@email.com
                senha:
                  type: string
                  format: password
                  example: 12345678Ab@
              type: object
      responses:
        '200':
          description: 'Login realizado com sucesso'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Login realizado com sucesso' }
                  access_token: { type: string, example: jwt_aqui }
                  UUID: { type: string, example: e04230085f34fcdc518137ac826725 }
                  nome: { type: string, example: 'Luiz Felipe' }
                  email: { type: string, format: email, example: teste@email.com }
                  foto_perfil: { type: string, example: null, nullable: true }
                type: object
        '400':
          description: 'Erro de validação na requisição'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Dados inválidos' }
                type: object
        '401':
          description: 'Credenciais inválidas'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Email ou senha inválidos' }
                type: object
  /perfil:
    get:
      tags:
        - Auth
      summary: 'Retorna os dados do perfil do usuário autenticado'
      operationId: 11b2b4bdfe5b35bed6f42bed010cae98
      responses:
        '200':
          description: 'Perfil acessado com sucesso'
          content:
            application/json:
              schema:
                properties:
                  success: { type: boolean, example: true }
                  mensagem: { type: string, example: 'Perfil acessado com sucesso' }
                  id_usuario: { type: integer, example: 1 }
                  usuario: { properties: { id_usuario: { type: integer, example: 1 }, UUID: { type: string, example: e04230085f34fcdc518137ac826725 }, nome: { type: string, example: 'Luiz Felipe' }, email: { type: string, format: email, example: teste@email.com } }, type: object }
                type: object
        '401':
          description: 'Token ausente, inválido ou sem permissão'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Token inválido para acesso' }
                type: object
      security:
        -
          bearerAuth: []
  /livros:
    put:
      tags:
        - Livros
      summary: 'Atualiza um livro existente do usuário autenticado'
      operationId: ee928fab664b23084de1dbe7464ea81e
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - id_livro
              properties:
                id_livro:
                  type: integer
                  example: 10
                titulo:
                  type: string
                  example: 'Dom Casmurro - edição revisada'
                  nullable: true
                autor:
                  type: string
                  example: 'Machado de Assis'
                  nullable: true
                ano:
                  type: integer
                  example: 1900
                  nullable: true
                genero:
                  type: string
                  example: Romance
                  nullable: true
                status:
                  type: string
                  example: lendo
                  nullable: true
                avaliacao:
                  type: integer
                  example: 4
                  nullable: true
                anotacoes:
                  type: string
                  example: 'Leitura em andamento'
                  nullable: true
              type: object
      responses:
        '200':
          description: 'Livro atualizado com sucesso'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Livro atualizado com sucesso' }
                  detail: { properties: { livro: { properties: { id: { type: integer, example: 10 }, titulo: { type: string, example: 'Dom Casmurro - edição revisada' }, autor: { type: string, example: 'Machado de Assis' }, ano: { type: integer, example: 1900 }, genero: { type: string, example: Romance, nullable: true }, status: { type: string, example: lendo }, avaliacao: { type: integer, example: 4, nullable: true }, anotacoes: { type: string, example: 'Leitura em andamento', nullable: true } }, type: object } }, type: object }
                type: object
        '400':
          description: 'Id do livro ausente ou dados inválidos'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Id do livro é obrigatório' }
                type: object
        '401':
          description: 'Não autenticado'
        '404':
          description: 'Livro não encontrado'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Livro não encontrado' }
                type: object
        '500':
          description: 'Erro ao atualizar livro'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Erro ao atualizar livro' }
                type: object
      security:
        -
          bearerAuth: []
    post:
      tags:
        - Livros
      summary: 'Cria um novo livro para o usuário autenticado'
      operationId: b739368170d28460413bda43250d382b
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - titulo
                - autor
                - ano
                - status
              properties:
                titulo:
                  type: string
                  example: 'Dom Casmurro'
                autor:
                  type: string
                  example: 'Machado de Assis'
                ano:
                  type: integer
                  example: 1899
                genero:
                  type: string
                  example: Romance
                  nullable: true
                status:
                  type: string
                  example: quero_ler
                avaliacao:
                  type: integer
                  example: 5
                  nullable: true
                anotacoes:
                  type: string
                  example: 'Clássico da literatura brasileira'
                  nullable: true
              type: object
      responses:
        '201':
          description: 'Livro criado com sucesso'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Livro criado com sucesso' }
                  id: { type: integer, example: 10 }
                type: object
        '400':
          description: 'Dados inválidos'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Campo título é obrigatório' }
                type: object
        '401':
          description: 'Não autenticado'
        '500':
          description: 'Erro ao criar livro'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Erro ao criar livro' }
                type: object
      security:
        -
          bearerAuth: []
    delete:
      tags:
        - Livros
      summary: 'Deleta um livro do usuário autenticado'
      operationId: d4487ace35a2539f559bc45a6a2a4568
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - id_livro
              properties:
                id_livro:
                  type: integer
                  example: 10
              type: object
      responses:
        '204':
          description: 'Livro deletado com sucesso'
        '400':
          description: 'Id do livro não informado'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Id do livro é obrigatório' }
                type: object
        '401':
          description: 'Não autenticado'
        '404':
          description: 'Livro não encontrado'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Livro não encontrado' }
                type: object
      security:
        -
          bearerAuth: []
  /livros/listar:
    get:
      tags:
        - Livros
      summary: 'Lista livros do usuário autenticado'
      operationId: 7e1bfe193830cf536c5ae807c7be522e
      parameters:
        -
          name: page
          in: query
          description: 'Página atual'
          required: false
          schema:
            type: integer
            example: 1
            default: 1
        -
          name: limit
          in: query
          description: 'Quantidade de itens por página'
          required: false
          schema:
            type: integer
            example: 10
            default: 10
      responses:
        '200':
          description: 'Livros retornados com sucesso'
          content:
            application/json:
              schema:
                properties:
                  detail: { properties: { livros: { type: array, items: { properties: { titulo: { type: string, example: 'Dom Casmurro' }, autor: { type: string, example: 'Machado de Assis' }, ano: { type: integer, example: 1899, nullable: true }, genero: { type: string, example: Romance }, status: { type: string, example: lendo }, avaliacao: { type: integer, example: 5, nullable: true }, anotacoes: { type: string, example: 'Muito bom', nullable: true } }, type: object } }, paginacao: { properties: { page: { type: integer, example: 1 }, limit: { type: integer, example: 10 }, total: { type: integer, example: 1 }, total_pages: { type: integer, example: 1 } }, type: object } }, type: object }
                type: object
        '401':
          description: 'Não autenticado'
        '404':
          description: 'Nenhum livro encontrado'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Nenhum livro encontrado' }
                type: object
      security:
        -
          bearerAuth: []
  /recuperar-senha:
    post:
      tags:
        - Senha
      summary: 'Solicita recuperação de senha'
      operationId: 6c4bbe3c4383d35ae0ddc5a28f6bc122
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: teste@email.com
              type: object
      responses:
        '200':
          description: 'Solicitação processada com sucesso'
          content:
            application/json:
              schema:
                properties:
                  success: { type: boolean, example: true }
                  mensagem: { type: string, example: 'Se o e-mail estiver cadastrado, você receberá instruções para redefinir sua senha.' }
                type: object
        '400':
          description: 'E-mail não informado'
          content:
            application/json:
              schema:
                properties:
                  success: { type: boolean, example: false }
                  mensagem: { type: string, example: 'E-mail é obrigatório' }
                type: object
        '500':
          description: 'Erro ao gerar token ou enviar e-mail'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Erro ao enviar e-mail' }
                type: object
  /redefinir-senha:
    post:
      tags:
        - Senha
      summary: 'Redefine a senha do usuário'
      operationId: f1050548a77cb0a6d6db0f7e4042d2cb
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - token
                - senha
              properties:
                token:
                  type: string
                  example: a1b2c3d4e5f6g7h8
                senha:
                  type: string
                  format: password
                  example: NovaSenha@123
              type: object
      responses:
        '200':
          description: 'Senha redefinida com sucesso'
          content:
            application/json:
              schema:
                properties:
                  success: { type: boolean, example: true }
                  mensagem: { type: string, example: 'Senha redefinida com sucesso' }
                type: object
        '401':
          description: 'Não autenticado'
        '500':
          description: 'Não foi possível atualizar a senha'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Nao foi possível atualizar a senha' }
                type: object
      security:
        -
          bearerAuth: []
  /usuario/foto:
    put:
      tags:
        - Usuário
      summary: 'Atualiza a foto de perfil do usuário autenticado'
      operationId: a76c0610241bf27126a5aaf1daaf901e
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - url_foto
              properties:
                url_foto:
                  type: string
                  format: uri
                  example: 'https://meusite.com/imagens/foto.jpg'
              type: object
      responses:
        '200':
          description: 'Foto de perfil atualizada com sucesso'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Foto de perfil atualizada com sucesso' }
                  foto_perfil: { type: string, format: uri, example: 'https://meusite.com/imagens/foto.jpg' }
                type: object
        '400':
          description: 'URL ausente ou inválida'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'A URL da foto é inválida' }
                type: object
        '401':
          description: 'Não autenticado'
        '500':
          description: 'Erro ao atualizar a foto de perfil'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Erro ao atualizar a foto de perfil' }
                type: object
      security:
        -
          bearerAuth: []
  /usuario:
    get:
      tags:
        - Usuário
      summary: 'Lista os dados do usuário autenticado'
      operationId: 1ee74c0a21f0b1d380b76ab89163a811
      responses:
        '200':
          description: 'Usuário encontrado'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Usuário encontrado' }
                  usuario: { type: object, additionalProperties: true }
                type: object
        '401':
          description: 'Não autenticado'
        '404':
          description: 'Usuário não encontrado'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Usuário não encontrado' }
                type: object
      security:
        -
          bearerAuth: []
    put:
      tags:
        - Usuário
      summary: 'Edita os dados do usuário autenticado'
      operationId: 9096c93a3a91a723d09c1fb0c1f9db71
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                nome:
                  type: string
                  example: 'Luiz Felipe'
                email:
                  type: string
                  format: email
                  example: luiz@email.com
              type: object
      responses:
        '200':
          description: 'Usuário atualizado com sucesso'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Usuario atualizado com sucesso' }
                  usuario: { properties: { id_usuario: { type: integer, example: 1 } }, type: object }
                type: object
        '401':
          description: 'Não autenticado'
        '409':
          description: 'E-mail já está em uso por outro usuário'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'O email ja esta em uso por outro usuario' }
                type: object
        '500':
          description: 'Erro ao atualizar usuário'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Erro ao atualizar usuário' }
                type: object
      security:
        -
          bearerAuth: []
    delete:
      tags:
        - Usuário
      summary: 'Deleta o usuário autenticado'
      operationId: c22821ed743d1fe670a7ff3a999c1f5f
      responses:
        '200':
          description: 'Usuário deletado com sucesso'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Usuário deletado com sucesso' }
                type: object
        '401':
          description: 'Não autenticado'
        '500':
          description: 'Erro ao deletar usuário'
          content:
            application/json:
              schema:
                properties:
                  mensagem: { type: string, example: 'Erro ao deletar usuário' }
                type: object
      security:
        -
          bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      bearerFormat: JWT
      scheme: bearer
tags:
  -
    name: Auth
    description: Auth
  -
    name: Livros
    description: Livros
  -
    name: Senha
    description: Senha
  -
    name: Usuário
    description: Usuário
